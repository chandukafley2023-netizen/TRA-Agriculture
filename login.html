<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Login | TRA Agriculture</title>
    <!-- Linked to the master stylesheet! -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">🌱 TRA Agri-Tech</a>
        
        <div class="hamburger" id="hamburger-menu">☰</div>

        <div class="nav-links" id="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="greenhouses.html">Greenhouses</a>
            <a href="mushroom.html">Mushroom Hut</a>
            <a href="ourteam.html">Our Team</a>
            <button class="theme-btn" id="theme-toggle">🌙 Dark Mode</button>
        </div>
    </nav>

    <main class="login-wrapper">
        <div class="login-card">
            <div class="login-icon">🔒</div>
            <h2>Team Portal</h2>
            <p>Authorized club members only.</p>
            
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="email">School Email Address</label>
                    <input type="email" id="email" required placeholder="student@tra.edu">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="submit-btn">Secure Login</button>
            </form>

            <div class="login-footer">
                Forgot your password? <a href="#">Contact the System Admin</a>
            </div>
        </div>
    </main>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // ==========================================
        // UI & THEME TOGGLE LOGIC
        // ==========================================
        const themeToggleBtn = document.getElementById('theme-toggle');
        const hamburgerMenu = document.getElementById('hamburger-menu');
        const navLinks = document.getElementById('nav-links');
        
        // Mobile Hamburger Menu Toggle
        hamburgerMenu.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Light/Dark Theme Logic
        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            themeToggleBtn.innerHTML = '☀️ Light Mode';
        }

        themeToggleBtn.addEventListener('click', () => {
            if (document.body.getAttribute('data-theme') === 'dark') {
                document.body.removeAttribute('data-theme');
                themeToggleBtn.innerHTML = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                themeToggleBtn.innerHTML = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark');
            }
        });

        // ==========================================
        // LOGIN LOGIC
        // ==========================================
        function handleLogin(event) {
            event.preventDefault(); // Prevents the page from refreshing immediately
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // This is a placeholder! Once you set up Firebase Authentication, you will link it here.
            alert("Login attempt for " + email + ".\n\nNote: Database authentication is not yet connected!");
        }
    </script>
</body>
</html>
