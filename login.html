<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Login | TRA Agriculture</title>
    <style>
        /* Light Theme (Default) - Fresh & Earthy */
        :root {
            --bg-color: #e5efe9;
            --panel-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --accent-green: #059669;
            --accent-blue: #2563eb;
            --warning-orange: #d97706;
            --danger-red: #dc2626;
            --nav-bg: #ffffff;
            --nav-border: #a7f3d0;
            --card-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        /* Dark Theme - Soothing Deep Forest Greens */
        [data-theme="dark"] {
            --bg-color: #141c18;
            --panel-bg: #1f2d25;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981; 
            --accent-blue: #3b82f6;
            --warning-orange: #f59e0b;
            --danger-red: #ef4444;
            --nav-bg: #0d1411;
            --nav-border: #1f2d25;
            --card-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Navigation */
        nav {
            background-color: var(--nav-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--nav-border);
            transition: background-color 0.3s ease;
            position: relative;
        }

        a.logo {
            text-decoration: none;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-green);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hamburger {
            display: none;
            font-size: 1.8rem;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent-green);
        }

        .theme-btn {
            background: transparent;
            border: 2px solid var(--accent-green);
            color: var(--text-main);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .theme-btn:hover {
            background: var(--accent-green);
            color: #ffffff;
        }

        /* Login Layout */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px); /* Fill the screen minus navbar */
            padding: 2rem;
            box-sizing: border-box;
        }

        .login-card {
            background-color: var(--panel-bg);
            padding: 3rem 2.5rem;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border-top: 4px solid var(--accent-blue);
            transition: background-color 0.3s ease;
        }

        .login-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .login-card h2 {
            color: var(--text-main);
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }

        .login-card p {
            color: var(--text-muted);
            margin: 0 0 2rem 0;
            font-size: 0.95rem;
        }

        /* Form Inputs */
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--nav-border);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
            font-family: inherit;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .submit-btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            font-size: 1.1rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        .login-footer {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: bold;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            nav { flex-wrap: wrap; }
            .hamburger { display: block; }
            .nav-links {
                display: none;
                flex-direction: column;
                width: 100%;
                text-align: center;
                gap: 15px;
                padding-top: 15px;
                padding-bottom: 10px;
            }
            .nav-links.active { display: flex; }
            .nav-links a, .theme-btn {
                margin-left: 0;
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">🌱 TRA Agri-Tech</a>
        
        <div class="hamburger" id="hamburger-menu">☰</div>

        <div class="nav-links" id="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="greenhouse.html">Greenhouses</a>
            <a href="mushroom.html">Mushroom Hut</a>
            <a href="ourteam.html">Our Team</a>
            <button class="theme-btn" id="theme-toggle">🌙 Dark Mode</button>
        </div>
    </nav>

    <main class="login-wrapper">
        <div class="login-card">
            <div class="login-icon">🔒</div>
            <h2>Team Portal</h2>
            <p>Authorized club members only.</p>
            
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="email">School Email Address</label>
                    <input type="email" id="email" required placeholder="student@tra.edu">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="submit-btn">Secure Login</button>
            </form>

            <div class="login-footer">
                Forgot your password? <a href="#">Contact the System Admin</a>
            </div>
        </div>
    </main>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // ==========================================
        // UI & THEME TOGGLE LOGIC
        // ==========================================
        const themeToggleBtn = document.getElementById('theme-toggle');
        const hamburgerMenu = document.getElementById('hamburger-menu');
        const navLinks = document.getElementById('nav-links');
        
        // Mobile Hamburger Menu Toggle
        hamburgerMenu.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Light/Dark Theme Logic
        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            themeToggleBtn.innerHTML = '☀️ Light Mode';
        }

        themeToggleBtn.addEventListener('click', () => {
            if (document.body.getAttribute('data-theme') === 'dark') {
                document.body.removeAttribute('data-theme');
                themeToggleBtn.innerHTML = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                themeToggleBtn.innerHTML = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark');
            }
        });

        // ==========================================
        // LOGIN LOGIC
        // ==========================================
        function handleLogin(event) {
            event.preventDefault(); // Prevents the page from refreshing immediately
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // This is a placeholder! Once you set up Firebase Authentication, you will link it here.
            alert("Login attempt for " + email + ".\n\nNote: Database authentication is not yet connected!");
        }
    </script>
</body>
</html>
